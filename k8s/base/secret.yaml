# =============================================================================
# RTR MRP - KUBERNETES SECRET
# Sensitive configuration (values should be base64 encoded)
# Replace placeholders with actual base64-encoded values
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: rtr-mrp-secrets
  namespace: rtr-mrp
  labels:
    app: rtr-mrp
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:password@postgres:5432/rtr_mrp?schema=public"
  
  # Redis
  REDIS_URL: "redis://redis:6379"
  
  # Auth
  NEXTAUTH_SECRET: "your-secret-key-minimum-32-characters"
  NEXTAUTH_URL: "https://app.rtr-mrp.com"
  
  # AWS S3
  AWS_ACCESS_KEY_ID: "your-access-key"
  AWS_SECRET_ACCESS_KEY: "your-secret-key"
  AWS_REGION: "ap-southeast-1"
  S3_BUCKET: "rtr-mrp-storage"
  
  # Sentry (optional)
  SENTRY_DSN: ""
  
  # Email (optional)
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""

---

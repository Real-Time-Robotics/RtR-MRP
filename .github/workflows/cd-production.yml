# .github/workflows/cd-production.yml
# Continuous Deployment to Production for RTR MRP System

name: CD Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/hung/RtR-MRP

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Install dependencies ==="
            docker compose exec -T app npm install --production=false

            echo "=== Run Prisma migrations ==="
            docker compose exec -T app npx prisma generate
            docker compose exec -T app npx prisma db push --skip-generate

            echo "=== Rebuild application ==="
            docker compose build --no-cache app

            echo "=== Restart with zero-downtime ==="
            docker compose up -d --no-deps app

            echo "=== Clean up ==="
            docker system prune -f

            echo "$(date): Deployed ${{ steps.version.outputs.version }}" >> /tmp/rtr-mrp-deployments.log

      - name: Health Check
        run: |
          sleep 30
          for i in {1..5}; do
            if curl -sf ${{ secrets.PRODUCTION_URL }}/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Notify Success
        if: success() && vars.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Production deployment successful!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\n*Version:* ${{ steps.version.outputs.version }}\n*By:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
